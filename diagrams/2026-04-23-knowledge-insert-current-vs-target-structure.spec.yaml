meta:
  profile: engineering-review
  source: generated
  theme: tech-blue
  layout: horizontal
  canvas: 2400x1400
  routing: orthogonal
  title: Wiki 插入实现：当前结构 vs 目标结构
  description: 对比仓库当前 knowledge-insert 实现的真实分层，以及用户期望的 source-first、taxonomy-aware 目标分层。
  legend: 绿色=当前已实现；蓝色=目标结构；浅黄=当前关键缺口；青色=可读写与回源能力。
modules:
  - id: current
    label: 当前实现结构
    color: '#DCFCE7'
  - id: target
    label: 目标结构
    color: '#DBEAFE'
nodes:
  - id: current_source
    label: |-
      Source 入口
      chat attachment -> accepted source
    type: process
    module: current
    size: large
    style:
      fillColor: '#DCFCE7'
      strokeColor: '#15803D'
      fontColor: '#14532D'
      strokeWidth: 2
  - id: current_blocks
    label: |-
      Resource / Blocks / Batches
      prepare_source_resource
      split_resource_blocks
      split_block_batches
    type: process
    module: current
    size: xl
    style:
      fillColor: '#DCFCE7'
      strokeColor: '#15803D'
      fontColor: '#14532D'
  - id: current_extract
    label: |-
      Extraction Candidates
      entities / assertions / relations
      evidenceAnchors / sectionCandidates / topicHints
    type: process
    module: current
    size: xl
    style:
      fillColor: '#DCFCE7'
      strokeColor: '#15803D'
      fontColor: '#14532D'
  - id: current_sections
    label: |-
      Section 归并层
      section 是插入单位
      已有 body / entityIds / assertionIds / evidenceAnchorIds
    type: process
    module: current
    size: xl
    style:
      fillColor: '#DCFCE7'
      strokeColor: '#15803D'
      fontColor: '#14532D'
      strokeWidth: 2
  - id: current_hosts
    label: |-
      Topic Host 层
      resolve_topic_hosts
      当前 host resolve 输入 = section
    type: process
    module: current
    size: xl
    style:
      fillColor: '#FDE68A'
      strokeColor: '#D97706'
      fontColor: '#78350F'
      strokeWidth: 2
  - id: current_write
    label: |-
      Wiki 写入层
      build_topic_insertion_plan
      draft_knowledge_page
      apply_draft_upsert
    type: process
    module: current
    size: xl
    style:
      fillColor: '#DCFCE7'
      strokeColor: '#15803D'
      fontColor: '#14532D'
  - id: current_readback
    label: |-
      Graph / 回源读路径
      source-grounded ingest 可写 topic / section / evidence / source
      read_wiki_page -> read_raw_source
    type: process
    module: current
    size: xl
    style:
      fillColor: '#E0F2FE'
      strokeColor: '#0284C7'
      fontColor: '#0C4A6E'
      strokeWidth: 2
  - id: current_gap
    label: |-
      当前缺口
      没有 taxonomy resolve / audit / write
      也没有 entity/assertion/relation 的 durable write
    type: document
    module: current
    size: xl
    style:
      fillColor: '#FEF3C7'
      strokeColor: '#D97706'
      fontColor: '#78350F'
      strokeWidth: 2
  - id: target_source
    label: |-
      Source 入口
      上传 / 注册 / 识别 / source overview
      目标入口仍然是 source
    type: process
    module: target
    size: xl
    style:
      fillColor: '#DBEAFE'
      strokeColor: '#2563EB'
      fontColor: '#1E3A8A'
      strokeWidth: 2
  - id: target_topic_plan
    label: |-
      Topic 规划层
      先从 source 总览拿候选 topic
      reuse existing or create new
    type: process
    module: target
    size: xl
    style:
      fillColor: '#DBEAFE'
      strokeColor: '#2563EB'
      fontColor: '#1E3A8A'
      strokeWidth: 2
  - id: target_taxonomy
    label: |-
      Taxonomy 树层
      root
      new node generation
      leaf attach
      node merge
    type: process
    module: target
    size: xl
    style:
      fillColor: '#DBEAFE'
      strokeColor: '#2563EB'
      fontColor: '#1E3A8A'
      strokeWidth: 2
  - id: target_sections
    label: |-
      Section 贴源层
      source chunks -> section body
      正文贴近原文，而不是摘要壳
    type: process
    module: target
    size: xl
    style:
      fillColor: '#DBEAFE'
      strokeColor: '#2563EB'
      fontColor: '#1E3A8A'
      strokeWidth: 2
  - id: target_attach
    label: |-
      挂载层
      topic / taxonomy / parent section
      共同决定 section 最终落点
    type: process
    module: target
    size: xl
    style:
      fillColor: '#DBEAFE'
      strokeColor: '#2563EB'
      fontColor: '#1E3A8A'
  - id: target_graph
    label: |-
      Graph 语义层
      entity / concept / assertion / relation
      durable write + link
    type: process
    module: target
    size: xl
    style:
      fillColor: '#DBEAFE'
      strokeColor: '#2563EB'
      fontColor: '#1E3A8A'
      strokeWidth: 2
  - id: target_provenance
    label: |-
      Source Anchor / Provenance
      locator / excerpt / source path
      section 可定位回 source
    type: process
    module: target
    size: xl
    style:
      fillColor: '#E0F2FE'
      strokeColor: '#0284C7'
      fontColor: '#0C4A6E'
      strokeWidth: 2
  - id: target_surfaces
    label: |-
      Wiki + Graph Projection
      可读 / 可写 / 可审 / 可回跳
      agent 沿 topic -> section -> source anchors -> source 读取
    type: terminal
    module: target
    size: xl
    style:
      fillColor: '#CCFBF1'
      strokeColor: '#0F766E'
      fontColor: '#134E4A'
      strokeWidth: 2
edges:
  - from: current_source
    to: current_blocks
    type: primary
  - from: current_blocks
    to: current_extract
    type: primary
  - from: current_extract
    to: current_sections
    type: primary
  - from: current_sections
    to: current_hosts
    type: primary
  - from: current_hosts
    to: current_write
    type: primary
  - from: current_sections
    to: current_readback
    type: data
    label: section grounding
  - from: current_hosts
    to: current_gap
    type: optional
    label: taxonomy 未接入
  - from: current_extract
    to: current_gap
    type: optional
    label: graph durable write 未完成
  - from: target_source
    to: target_topic_plan
    type: primary
  - from: target_topic_plan
    to: target_taxonomy
    type: primary
    label: topic -> taxonomy planning
  - from: target_taxonomy
    to: target_sections
    type: primary
  - from: target_sections
    to: target_attach
    type: primary
  - from: target_attach
    to: target_graph
    type: primary
  - from: target_sections
    to: target_provenance
    type: data
    label: section anchors
  - from: target_graph
    to: target_provenance
    type: data
    label: assertion / relation evidence
  - from: target_provenance
    to: target_surfaces
    type: primary
  - from: target_graph
    to: target_surfaces
    type: primary
