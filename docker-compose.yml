name: llm-wiki-liiy

services:
  llm-wiki-liiy:
    build:
      context: .
    command: ["node", "dist/cli.js", "serve", "/data/project", "3000"]
    environment:
      - GRAPH_DATABASE_URL=postgres://postgres:postgres@postgres:5432/llm_wiki_liiy
    ports:
      - "3000:3000"
    volumes:
      - ./.llm-wiki-liiy:/data/project
    restart: unless-stopped
    depends_on:
      - postgres
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/health').then((response)=>{if(!response.ok){process.exit(1)}}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: llm_wiki_liiy
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
